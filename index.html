<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OAC Weather Display</title>
<style>
  :root {
    --bg: #0a1628;
    --panel: #11213a;
    --panel-soft: #0e1c30;
    --border: #1e3a5f;
    --accent: #3b82f6;
    --text: #e8edf5;
    --muted: #6b8cae;
    --station: #ffd24a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", Arial, sans-serif;
    overflow: hidden;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5vh 3vw;
    border-bottom: 2px solid var(--accent);
    background: var(--panel);
  }
  .header h1 {
    font-size: 2.2vw;
    letter-spacing: 0.05em;
    color: var(--text);
  }
  .header .sub {
    font-size: 1.05vw;
    color: var(--muted);
  }
  .clock {
    font-size: 1.5vw;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .layout {
    display: grid;
    grid-template-rows: 1.6fr 1fr;
    height: calc(100% - 10vh);
    padding: 1.5vh 3vw;
    gap: 1.5vh;
  }
  .section-title {
    font-size: 1.05vw;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.6vh;
    display: flex;
    align-items: center;
    gap: 0.5vw;
  }
  .section-title .dot {
    width: 0.5vw;
    height: 0.5vw;
    border-radius: 50%;
    background: var(--accent);
  }

  /* METAR — primary section */
  .metar-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.2vw;
    height: calc(100% - 2.4vh);
  }
  .metar-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.4vh 1.2vw;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .metar-card .station {
    font-size: 1.9vw;
    font-weight: 700;
    color: var(--station);
    letter-spacing: 0.04em;
    margin-bottom: 0.8vh;
  }
  .metar-card pre {
    font-family: "Consolas", "Courier New", monospace;
    font-size: 1.25vw;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
  }

  /* TAF — secondary section */
  .taf-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1vw;
    height: calc(100% - 2.4vh);
  }
  .taf-card {
    background: var(--panel-soft);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9vh 1vw;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .taf-card .station {
    font-size: 1.1vw;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-bottom: 0.4vh;
  }
  .taf-card pre {
    font-family: "Consolas", "Courier New", monospace;
    font-size: 0.78vw;
    line-height: 1.4;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
    opacity: 0.9;
  }

  .status {
    position: fixed;
    bottom: 0.6vh;
    right: 1.5vw;
    font-size: 0.8vw;
    color: var(--muted);
  }
  .error {
    color: #ff6b6b;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>OAC FLIGHT WEATHER</h1>
    <div class="sub">EBOS · EBAW · EBFN · LFQQ</div>
  </div>
  <div class="clock" id="clock">--:--:-- UTC</div>
</div>

<div class="layout">
  <div>
    <div class="section-title"><span class="dot"></span>METAR</div>
    <div class="metar-grid" id="metarGrid">
      <div class="metar-card"><div class="station">Loading…</div></div>
    </div>
  </div>
  <div>
    <div class="section-title">TAF</div>
    <div class="taf-grid" id="tafGrid">
      <div class="taf-card"><div class="station">Loading…</div></div>
    </div>
  </div>
</div>

<div class="status" id="status">Updating…</div>

<script>
  const STATIONS = ["EBOS", "EBAW", "EBFN", "LFQQ"];
  const STATION_PARAM = STATIONS.join(",");
  const METAR_URL_RAW = `https://aviationweather.gov/api/data/metar?ids=${encodeURIComponent(STATION_PARAM)}&format=raw&taf=true&hours=1`;

  // aviationweather.gov does not send CORS headers, so direct fetch()
  // calls from a browser on a different domain are blocked. Route
  // through a public CORS proxy that fetches server-side and relays
  // the response with the necessary header added.
  const CORS_PROXY = "https://corsproxy.io/?url=";
  const METAR_URL = CORS_PROXY + encodeURIComponent(METAR_URL_RAW);

  const REFRESH_MS = 60 * 1000; // 1 minute

  function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent =
      now.toUTCString().split(" ")[4] + " UTC";
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ---------- METAR / TAF parsing ----------
  // Actual raw format example:
  //   METAR EBAW 301320Z VRB03KT 9999 FEW027 22/16 Q1022 NOSIG
  //   METAR EBAW 301250Z 24003KT 180V270 9999 FEW027 21/15 Q1023 NOSIG
  //   TAF EBAW 301100Z 3012/3021 28006KT 9999 FEW035
  //   METAR EBOS 301320Z 26007KT 9999 -RA FEW020 SCT030 18/14 Q1023 NOSIG
  //   ...
  // Each line is prefixed with "METAR" or "TAF" plus the station code.
  // Multiple METAR lines can appear per station (most recent first) —
  // we keep only the first (latest) one seen per station.
  // TAF continuation/forecast-group lines have no prefix and are
  // indented, so they get appended to the current TAF in progress.
  function parseWeatherBlocks(raw) {
    const lines = raw.split("\n").filter(l => l.trim().length);
    const blocks = {};
    let tafInProgress = null; // station id of the TAF currently being appended to

    lines.forEach(rawLine => {
      const line = rawLine.trim();
      const metarMatch = line.match(/^METAR\s+([A-Z]{4})\s+(.*)$/);
      const tafMatch = line.match(/^TAF\s+([A-Z]{4})\s+(.*)$/);

      if (metarMatch) {
        const id = metarMatch[1];
        if (!blocks[id]) blocks[id] = { metar: "", taf: "" };
        if (!blocks[id].metar) blocks[id].metar = id + " " + metarMatch[2];
        tafInProgress = null;
      } else if (tafMatch) {
        const id = tafMatch[1];
        if (!blocks[id]) blocks[id] = { metar: "", taf: "" };
        blocks[id].taf = id + " " + tafMatch[2];
        tafInProgress = id;
      } else if (tafInProgress) {
        // Continuation line of the current TAF (indented forecast groups)
        blocks[tafInProgress].taf += "\n  " + line;
      }
    });
    return blocks;
  }

  function renderMetar(blocks) {
    const grid = document.getElementById("metarGrid");
    grid.innerHTML = "";
    STATIONS.forEach(id => {
      const data = blocks[id];
      const card = document.createElement("div");
      card.className = "metar-card";

      const stationEl = document.createElement("div");
      stationEl.className = "station";
      stationEl.textContent = id;
      card.appendChild(stationEl);

      const pre = document.createElement("pre");
      if (data && data.metar) {
        pre.textContent = data.metar;
      } else {
        pre.textContent = "No data available";
        pre.classList.add("error");
      }
      card.appendChild(pre);
      grid.appendChild(card);
    });
  }

  function renderTaf(blocks) {
    const grid = document.getElementById("tafGrid");
    grid.innerHTML = "";
    STATIONS.forEach(id => {
      const data = blocks[id];
      const card = document.createElement("div");
      card.className = "taf-card";

      const stationEl = document.createElement("div");
      stationEl.className = "station";
      stationEl.textContent = id;
      card.appendChild(stationEl);

      const pre = document.createElement("pre");
      if (data && data.taf) {
        pre.textContent = data.taf;
      } else {
        pre.textContent = "No TAF available";
        pre.classList.add("error");
      }
      card.appendChild(pre);
      grid.appendChild(card);
    });
  }

  // ---------- Fetch + refresh ----------
  async function fetchAll() {
    const statusEl = document.getElementById("status");
    try {
      const metarRes = await fetch(METAR_URL, { cache: "no-store" });
      if (!metarRes.ok) throw new Error("METAR HTTP " + metarRes.status);

      const metarRaw = await metarRes.text();
      const blocks = parseWeatherBlocks(metarRaw);
      renderMetar(blocks);
      renderTaf(blocks);

      statusEl.textContent = "Last updated: " + new Date().toLocaleTimeString("en-GB", { hour12: false }) + " (local)";
      statusEl.classList.remove("error");
    } catch (err) {
      statusEl.textContent = "Update failed: " + err.message + " — retrying…";
      statusEl.classList.add("error");
    }
  }

  fetchAll();
  setInterval(fetchAll, REFRESH_MS);
</script>

</body>
</html>
