<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OAC Weather Display</title>
<style>
  :root {
    --bg: #0a1628;
    --panel: #11213a;
    --panel-soft: #0e1c30;
    --border: #1e3a5f;
    --accent: #3b82f6;
    --text: #e8edf5;
    --muted: #6b8cae;
    --station: #ffd24a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", Arial, sans-serif;
    overflow: hidden;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5vh 3vw;
    border-bottom: 2px solid var(--accent);
    background: var(--panel);
  }
  .header h1 {
    font-size: 2.2vw;
    letter-spacing: 0.05em;
    color: var(--text);
  }
  .header .sub {
    font-size: 1.05vw;
    color: var(--muted);
  }
  .clock {
    font-size: 1.5vw;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .layout {
    display: grid;
    grid-template-rows: 1.6fr 1fr;
    height: calc(100% - 10vh);
    padding: 1.5vh 3vw;
    gap: 1.5vh;
  }
  .section-title {
    font-size: 1.05vw;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.6vh;
    display: flex;
    align-items: center;
    gap: 0.5vw;
  }
  .section-title .dot {
    width: 0.5vw;
    height: 0.5vw;
    border-radius: 50%;
    background: var(--accent);
  }

  /* METAR — primary section */
  .metar-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.2vw;
    height: calc(100% - 2.4vh);
  }
  .metar-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.4vh 1.2vw;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .metar-card .station {
    font-size: 1.9vw;
    font-weight: 700;
    color: var(--station);
    letter-spacing: 0.04em;
    margin-bottom: 0.8vh;
  }
  .metar-card pre {
    font-family: "Consolas", "Courier New", monospace;
    font-size: 1.25vw;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
  }

  /* TAF — secondary section */
  .taf-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1vw;
    height: calc(100% - 2.4vh);
  }
  .taf-card {
    background: var(--panel-soft);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9vh 1vw;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .taf-card .station {
    font-size: 1.1vw;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-bottom: 0.4vh;
  }
  .taf-card pre {
    font-family: "Consolas", "Courier New", monospace;
    font-size: 0.78vw;
    line-height: 1.4;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
    opacity: 0.9;
  }

  .status {
    position: fixed;
    bottom: 0.6vh;
    right: 1.5vw;
    font-size: 0.8vw;
    color: var(--muted);
  }
  .error {
    color: #ff6b6b;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>OAC FLIGHT WEATHER</h1>
    <div class="sub">EBOS · EBAW · EBFN · LFQQ</div>
  </div>
  <div class="clock" id="clock">--:--:-- UTC</div>
</div>

<div class="layout">
  <div>
    <div class="section-title"><span class="dot"></span>METAR</div>
    <div class="metar-grid" id="metarGrid">
      <div class="metar-card"><div class="station">Loading…</div></div>
    </div>
  </div>
  <div>
    <div class="section-title">TAF</div>
    <div class="taf-grid" id="tafGrid">
      <div class="taf-card"><div class="station">Loading…</div></div>
    </div>
  </div>
</div>

<div class="status" id="status">Updating…</div>

<script>
  const STATIONS = ["EBOS", "EBAW", "EBFN", "LFQQ"];
  const STATION_PARAM = STATIONS.join(",");
  const METAR_URL_RAW = `https://aviationweather.gov/api/data/metar?ids=${encodeURIComponent(STATION_PARAM)}&format=raw&taf=true&hours=1`;

  // aviationweather.gov does not send CORS headers, so direct fetch()
  // calls from a browser on a different domain are blocked. Route
  // through a public CORS proxy that fetches server-side and relays
  // the response with the necessary header added.
  const CORS_PROXY = "https://corsproxy.io/?url=";
  const METAR_URL = CORS_PROXY + encodeURIComponent(METAR_URL_RAW);

  const REFRESH_MS = 60 * 1000; // 1 minute

  function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent =
      now.toUTCString().split(" ")[4] + " UTC";
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ---------- METAR / TAF parsing ----------
  // Raw format example:
  //   EBOS 301650Z VRB03KT 9999 FEW035 18/12 Q1015
  //   TAF
  //   EBOS 301700Z 3018/3118 24008KT 9999 FEW035
  //     BECMG 3021/3023 22012KT
  // i.e. "TAF" appears alone on its own line, then the next line(s)
  // belong to that TAF until a new bare ICAO METAR line starts.
  function parseWeatherBlocks(raw) {
    const lines = raw.split("\n").map(l => l.trimEnd()).filter(l => l.trim().length);
    const blocks = {};
    let current = null;
    let mode = null; // "metar" | "taf"

    lines.forEach(rawLine => {
      const line = rawLine.trim();

      if (line === "TAF") {
        mode = "taf-pending"; // next line starts the TAF for the current station
        return;
      }

      const idMatch = line.match(/^([A-Z]{4})\s/);

      if (idMatch && mode !== "taf-pending") {
        // New METAR line
        current = idMatch[1];
        if (!blocks[current]) blocks[current] = { metar: "", taf: "" };
        blocks[current].metar = line;
        mode = "metar";
      } else if (idMatch && mode === "taf-pending") {
        // First line of a TAF block, station should match current
        current = idMatch[1];
        if (!blocks[current]) blocks[current] = { metar: "", taf: "" };
        blocks[current].taf = line;
        mode = "taf";
      } else if (mode === "taf" && current) {
        // Continuation line of the current TAF (indented forecast groups)
        blocks[current].taf += " " + line;
      } else if (mode === "metar" && current && !idMatch) {
        // Rare continuation of a METAR remark line
        blocks[current].metar += " " + line;
      }
    });
    return blocks;
  }

  function renderMetar(blocks) {
    const grid = document.getElementById("metarGrid");
    grid.innerHTML = "";
    STATIONS.forEach(id => {
      const data = blocks[id];
      const card = document.createElement("div");
      card.className = "metar-card";

      const stationEl = document.createElement("div");
      stationEl.className = "station";
      stationEl.textContent = id;
      card.appendChild(stationEl);

      const pre = document.createElement("pre");
      if (data && data.metar) {
        pre.textContent = data.metar;
      } else {
        pre.textContent = "No data available";
        pre.classList.add("error");
      }
      card.appendChild(pre);
      grid.appendChild(card);
    });
  }

  function renderTaf(blocks) {
    const grid = document.getElementById("tafGrid");
    grid.innerHTML = "";
    STATIONS.forEach(id => {
      const data = blocks[id];
      const card = document.createElement("div");
      card.className = "taf-card";

      const stationEl = document.createElement("div");
      stationEl.className = "station";
      stationEl.textContent = id;
      card.appendChild(stationEl);

      const pre = document.createElement("pre");
      if (data && data.taf) {
        pre.textContent = data.taf;
      } else {
        pre.textContent = "No TAF available";
        pre.classList.add("error");
      }
      card.appendChild(pre);
      grid.appendChild(card);
    });
  }

  // ---------- Fetch + refresh ----------
  async function fetchAll() {
    const statusEl = document.getElementById("status");
    try {
      const metarRes = await fetch(METAR_URL, { cache: "no-store" });
      if (!metarRes.ok) throw new Error("METAR HTTP " + metarRes.status);

      const metarRaw = await metarRes.text();
      const blocks = parseWeatherBlocks(metarRaw);
      renderMetar(blocks);
      renderTaf(blocks);

      statusEl.textContent = "Last updated: " + new Date().toLocaleTimeString("en-GB", { hour12: false }) + " (local)";
      statusEl.classList.remove("error");
    } catch (err) {
      statusEl.textContent = "Update failed: " + err.message + " — retrying…";
      statusEl.classList.add("error");
    }
  }

  fetchAll();
  setInterval(fetchAll, REFRESH_MS);
</script>

</body>
</html>
